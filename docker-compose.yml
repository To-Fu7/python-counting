services:
  services-vehicle-counting:
    build: .
    container_name: services-vehicle-counting
    restart: always
    env_file: .env
    volumes:
      - .:/app
    # network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  mosquitto_mqtt:
    image: eclipse-mosquitto:2.0
    container_name: services_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      - envisions
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

networks:
  envisions:
    driver: bridge


