services:
  services-person-counter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: services-person-counter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Path to cameras.json config file (mounted as volume)
      # This enables multi-camera mode: one container runs multiple cameras using threads
      MULTI_CAMERA_CONFIG: /app/config/cameras.json
    # ports:
      # - "8080:8080"
    volumes:
      # Mount the entire project directory (includes config/cameras.json)
      - .:/app
      # Alternatively, mount only the config directory:
      # - ./config:/app/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - envisions
    shm_size: 1gb
    # Note: To add more cameras, simply edit config/cameras.json and restart the container.
    # No need to create additional containers or services.

networks:
  envisions:
    driver: bridge



# NOTE: With multi-camera support, you no longer need multiple containers.
